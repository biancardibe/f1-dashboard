<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Live Dashboard - Real-time Telemetry & Analysis</title>
    <style>
        :root {
            --color-bg-primary: #0f172a;
            --color-bg-secondary: #1e293b;
            --color-bg-elevated: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-accent: #38bdf8;
            --color-success: #22c55e;
            --color-warning: #eab308;
            --color-danger: #ef4444;
            --color-purple: #a855f7;
            --color-border: rgba(148, 163, 184, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            overflow-x: hidden;
        }

        .container {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }

        .header {
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .selectors {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        select, button {
            background: var(--color-bg-elevated);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:hover, button:hover {
            background: #475569;
            border-color: var(--color-accent);
        }

        select:focus, button:focus {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-live {
            background: rgba(34, 197, 94, 0.2);
            color: var(--color-success);
            animation: pulse 2s infinite;
        }

        .status-ended {
            background: rgba(148, 163, 184, 0.2);
            color: var(--color-text-muted);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr 400px;
            gap: 1rem;
            padding: 1rem;
            overflow: hidden;
        }

        @media (max-width: 1400px) {
            .main-grid {
                grid-template-columns: 350px 1fr;
            }
            .right-panel {
                display: none;
            }
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .standings-table th {
            position: sticky;
            top: 0;
            background: var(--color-bg-elevated);
            padding: 0.5rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-text-muted);
            border-bottom: 1px solid var(--color-border);
        }

        .standings-table td {
            padding: 0.5rem;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--color-border);
        }

        .standings-table tr {
            cursor: pointer;
            transition: background 0.15s;
        }

        .standings-table tr:hover {
            background: var(--color-bg-elevated);
        }

        .standings-table tr.selected {
            background: rgba(56, 189, 248, 0.1);
            border-left: 3px solid var(--color-accent);
        }

        .team-color {
            width: 4px;
            height: 100%;
            position: absolute;
            left: 0;
        }

        .driver-name {
            font-weight: 600;
        }

        .sector-time {
            display: inline-block;
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .sector-yellow {
            background: rgba(234, 179, 8, 0.2);
            color: var(--color-warning);
        }

        .sector-green {
            background: rgba(34, 197, 94, 0.2);
            color: var(--color-success);
        }

        .sector-purple {
            background: rgba(168, 85, 247, 0.2);
            color: var(--color-purple);
        }

        .chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }

        .lap-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .lap-item {
            background: var(--color-bg-elevated);
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            cursor: pointer;
            transition: all 0.15s;
        }

        .lap-item:hover {
            border-color: var(--color-accent);
            transform: translateX(4px);
        }

        .lap-item.selected {
            border-color: var(--color-accent);
            background: rgba(56, 189, 248, 0.1);
        }

        .lap-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .lap-number {
            font-weight: 600;
            font-size: 1rem;
            color: var(--color-accent);
        }

        .lap-time {
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
        }

        .lap-sectors {
            display: flex;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-muted);
        }

        .spinner {
            border: 3px solid var(--color-bg-elevated);
            border-top: 3px solid var(--color-accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--color-danger);
            color: var(--color-danger);
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem;
        }

        .tab-container {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--color-border);
            padding: 0 1rem;
        }

        .tab {
            padding: 0.75rem 1rem;
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 500;
        }

        .tab:hover {
            color: var(--color-text-primary);
        }

        .tab.active {
            color: var(--color-accent);
            border-bottom-color: var(--color-accent);
        }

        .driver-comparison {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            flex-wrap: wrap;
        }

        .driver-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            background: var(--color-bg-elevated);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 0.875rem;
        }

        .driver-chip button {
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            padding: 0;
            font-size: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-text-muted);
        }

        .team-colors {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>🏎️</span>
                F1 Live Dashboard
            </h1>
            <div class="selectors">
                <select id="year-select">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                </select>
                <select id="meeting-select">
                    <option value="">Seleziona GP...</option>
                </select>
                <select id="session-select">
                    <option value="">Seleziona Sessione...</option>
                </select>
                <span id="session-status" class="status-badge status-ended">Storico</span>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel left-panel">
                <div class="panel-header">
                    <h2>Classifica Live</h2>
                </div>
                <div class="panel-body">
                    <div id="standings-container">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Caricamento sessioni...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel center-panel">
                <div class="tab-container">
                    <button class="tab active" data-tab="laps">Giri & Settori</button>
                    <button class="tab" data-tab="telemetry">Telemetria</button>
                    <button class="tab" data-tab="pace">Passo Gara</button>
                </div>
                <div class="panel-body">
                    <div id="tab-content-laps" class="tab-content">
                        <div class="empty-state">
                            <p>👆 Seleziona un pilota dalla classifica</p>
                        </div>
                    </div>
                    <div id="tab-content-telemetry" class="tab-content" style="display: none;">
                        <div class="empty-state">
                            <p>📊 Seleziona un pilota per visualizzare la telemetria</p>
                        </div>
                    </div>
                    <div id="tab-content-pace" class="tab-content" style="display: none;">
                        <div class="empty-state">
                            <p>⏱️ Seleziona piloti per confrontare il passo gara</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel right-panel">
                <div class="panel-header">
                    <h2>Confronto Piloti</h2>
                </div>
                <div class="panel-body">
                    <div class="driver-comparison" id="driver-comparison">
                        <div class="empty-state">
                            <p>Seleziona fino a 3 piloti per confrontare i dati</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // State management
        const state = {
            meetings: [],
            sessions: [],
            drivers: [],
            selectedMeeting: null,
            selectedSession: null,
            selectedDrivers: [],
            lapsData: {},
            telemetryData: {},
            carDataCache: {},
            charts: {},
            currentTab: 'laps',
            updateBuffer: [],
            lastUpdate: Date.now()
        };

        const API_BASE = 'https://api.openf1.org/v1';
        const TEAM_COLORS = {
            'Red Bull Racing': '#3671C6',
            'Ferrari': '#E8002D',
            'Mercedes': '#27F4D2',
            'McLaren': '#FF8000',
            'Aston Martin': '#229971',
            'Alpine': '#FF87BC',
            'Williams': '#64C4FF',
            'RB': '#6692FF',
            'Kick Sauber': '#52E252',
            'Haas F1 Team': '#B6BABD'
        };

        // Utility functions
        function formatTime(seconds) {
            if (!seconds) return '-';
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(3);
            return mins > 0 ? `${mins}:${secs.padStart(6, '0')}` : secs;
        }

        function getTeamColor(teamName) {
            return TEAM_COLORS[teamName] || '#94a3b8';
        }

        function getSectorClass(current, previous, best, absolute) {
            if (!current || !previous) return 'sector-yellow';
            if (current <= absolute) return 'sector-purple';
            if (current < previous) return 'sector-green';
            return 'sector-yellow';
        }

        // API calls with error handling
        async function fetchAPI(endpoint, params = {}) {
            const url = new URL(`${API_BASE}${endpoint}`);
            Object.entries(params).forEach(([key, value]) => {
                if (value !== null && value !== undefined) {
                    url.searchParams.append(key, value);
                }
            });

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API fetch error:', error);
                throw error;
            }
        }

        // Initialize app
        async function init() {
            await loadMeetings();
            setupEventListeners();
            await autoSelectLatestSession();
        }

        async function loadMeetings() {
            const year = document.getElementById('year-select').value;
            try {
                state.meetings = await fetchAPI('/meetings', { year });
                state.meetings.sort((a, b) => new Date(b.date_start) - new Date(a.date_start));
                populateMeetingSelect();
            } catch (error) {
                showError('Errore nel caricamento dei GP');
            }
        }

        function populateMeetingSelect() {
            const select = document.getElementById('meeting-select');
            select.innerHTML = '<option value="">Seleziona GP...</option>';
            state.meetings.forEach(meeting => {
                const option = document.createElement('option');
                option.value = meeting.meeting_key;
                const date = new Date(meeting.date_start).toLocaleDateString('it-IT');
                option.textContent = `${meeting.meeting_name} - ${date}`;
                select.appendChild(option);
            });
        }

        async function loadSessions(meetingKey) {
            try {
                state.sessions = await fetchAPI('/sessions', { meeting_key: meetingKey });
                state.sessions.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));
                populateSessionSelect();
            } catch (error) {
                showError('Errore nel caricamento delle sessioni');
            }
        }

        function populateSessionSelect() {
            const select = document.getElementById('session-select');
            select.innerHTML = '<option value="">Seleziona Sessione...</option>';
            state.sessions.forEach(session => {
                const option = document.createElement('option');
                option.value = session.session_key;
                option.textContent = `${session.session_name}`;
                select.appendChild(option);
            });
        }

        async function autoSelectLatestSession() {
            const now = new Date();
            let latestSession = null;

            for (const meeting of state.meetings) {
                const meetingSessions = await fetchAPI('/sessions', { meeting_key: meeting.meeting_key });
                for (const session of meetingSessions) {
                    const sessionEnd = new Date(session.date_end);
                    if (sessionEnd < now && (!latestSession || sessionEnd > new Date(latestSession.date_end))) {
                        latestSession = { ...session, meeting };
                    }
                }
            }

            if (latestSession) {
                document.getElementById('meeting-select').value = latestSession.meeting.meeting_key;
                await loadSessions(latestSession.meeting.meeting_key);
                document.getElementById('session-select').value = latestSession.session_key;
                await loadSessionData(latestSession.session_key);
            }
        }

        async function loadSessionData(sessionKey) {
            state.selectedSession = sessionKey;
            showLoading('standings-container');

            try {
                const [drivers, laps, positions] = await Promise.all([
                    fetchAPI('/drivers', { session_key: sessionKey }),
                    fetchAPI('/laps', { session_key: sessionKey }),
                    fetchAPI('/position', { session_key: sessionKey })
                ]);

                state.drivers = drivers;
                state.lapsData = {};
                state.positions = positions;

                laps.forEach(lap => {
                    if (!state.lapsData[lap.driver_number]) {
                        state.lapsData[lap.driver_number] = [];
                    }
                    state.lapsData[lap.driver_number].push(lap);
                });

                Object.keys(state.lapsData).forEach(driverNum => {
                    state.lapsData[driverNum].sort((a, b) => a.lap_number - b.lap_number);
                });

                renderStandings();
                updateSessionStatus();
            } catch (error) {
                showError('Errore nel caricamento dei dati della sessione');
            }
        }

        function renderStandings() {
            const container = document.getElementById('standings-container');
            
            // Calcola l'ultima posizione nota per ogni pilota
            const latestPositionsByDriver = {};
            (state.positions || []).forEach(pos => {
                const key = pos.driver_number;
                const current = latestPositionsByDriver[key];
                if (!current || new Date(pos.date) > new Date(current.date)) {
                    latestPositionsByDriver[key] = pos;
                }
            });

            const driversWithLaps = state.drivers.map(driver => {
                const driverLaps = state.lapsData[driver.driver_number] || [];
                const bestLap = driverLaps.reduce((best, lap) => {
                    if (!lap.lap_duration) return best;
                    if (!best || lap.lap_duration < best.lap_duration) return lap;
                    return best;
                }, null);

                const latestPos = latestPositionsByDriver[driver.driver_number];

                return {
                    ...driver,
                    lapCount: driverLaps.length,
                    bestLap: bestLap?.lap_duration || null,
                    racePosition: latestPos ? latestPos.position : null
                };
            });

            // Ordina per posizione di gara effettiva
            driversWithLaps.sort((a, b) => {
                if (a.racePosition == null && b.racePosition == null) return 0;
                if (a.racePosition == null) return 1;
                if (b.racePosition == null) return -1;
                return a.racePosition - b.racePosition;
            });

            const table = document.createElement('table');
            table.className = 'standings-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>N°</th>
                        <th>Pilota</th>
                        <th>Team</th>
                        <th>Giri</th>
                        <th>Miglior Giro</th>
                    </tr>
                </thead>
                <tbody>
                    ${driversWithLaps.map((driver, index) => `
                        <tr data-driver="${driver.driver_number}" class="${state.selectedDrivers.includes(driver.driver_number) ? 'selected' : ''}">
                            <td>${driver.racePosition ?? (index + 1)}</td>
                            <td><strong>${driver.driver_number}</strong></td>
                            <td>
                                <span class="team-colors" style="background: ${getTeamColor(driver.team_name)}"></span>
                                <span class="driver-name">${driver.broadcast_name || driver.full_name}</span>
                            </td>
                            <td style="font-size: 0.75rem; color: var(--color-text-muted);">${driver.team_name}</td>
                            <td>${driver.lapCount}</td>
                            <td style="font-family: 'Courier New', monospace;">${formatTime(driver.bestLap)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;

            container.innerHTML = '';
            container.appendChild(table);

            table.querySelectorAll('tbody tr').forEach(row => {
                row.addEventListener('click', () => {
                    const driverNumber = parseInt(row.dataset.driver);
                    toggleDriverSelection(driverNumber);
                });
            });
        }

        function toggleDriverSelection(driverNumber) {
            const index = state.selectedDrivers.indexOf(driverNumber);
            
            if (index > -1) {
                state.selectedDrivers.splice(index, 1);
                delete state.carDataCache[driverNumber];
            } else {
                if (state.selectedDrivers.length >= 3) {
                    const removed = state.selectedDrivers.shift();
                    delete state.carDataCache[removed];
                }
                state.selectedDrivers.push(driverNumber);
            }

            renderStandings();
            updateDriverComparison();
            
            if (state.selectedDrivers.length > 0) {
                loadDriverLaps(state.selectedDrivers[state.selectedDrivers.length - 1]);
            } else {
                document.getElementById('tab-content-laps').innerHTML = '<div class="empty-state"><p>👆 Seleziona un pilota dalla classifica</p></div>';
                document.getElementById('tab-content-telemetry').innerHTML = '<div class="empty-state"><p>📊 Seleziona un pilota per visualizzare la telemetria</p></div>';
                document.getElementById('tab-content-pace').innerHTML = '<div class="empty-state"><p>⏱️ Seleziona piloti per confrontare il passo gara</p></div>';
            }
        }

        function updateDriverComparison() {
            const container = document.getElementById('driver-comparison');
            
            if (state.selectedDrivers.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Seleziona fino a 3 piloti per confrontare i dati</p></div>';
                return;
            }

            container.innerHTML = state.selectedDrivers.map(driverNum => {
                const driver = state.drivers.find(d => d.driver_number === driverNum);
                return `
                    <div class="driver-chip">
                        <span class="team-colors" style="background: ${getTeamColor(driver.team_name)}"></span>
                        <span>${driver.broadcast_name || driver.full_name}</span>
                        <button onclick="removeDriver(${driverNum})">×</button>
                    </div>
                `;
            }).join('');
        }

        window.removeDriver = function(driverNumber) {
            const index = state.selectedDrivers.indexOf(driverNumber);
            if (index > -1) {
                state.selectedDrivers.splice(index, 1);
                renderStandings();
                updateDriverComparison();
            }
        };

        async function loadDriverLaps(driverNumber) {
            const laps = state.lapsData[driverNumber] || [];
            const container = document.getElementById('tab-content-laps');

            if (laps.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Nessun giro disponibile</p></div>';
                return;
            }

            const driver = state.drivers.find(d => d.driver_number === driverNumber);
            const bestLap = laps.reduce((best, lap) => {
                if (!lap.lap_duration) return best;
                if (!best || lap.lap_duration < best.lap_duration) return lap;
                return best;
            }, null);

            const html = `
                <div style="padding: 1rem;">
                    <h3 style="margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span class="team-colors" style="background: ${getTeamColor(driver.team_name)}"></span>
                        ${driver.broadcast_name || driver.full_name}
                        <span style="color: var(--color-text-muted); font-size: 0.875rem; font-weight: normal;">
                            - Miglior giro: ${formatTime(bestLap?.lap_duration)}
                        </span>
                    </h3>
                    <div class="lap-list">
                        ${laps.map(lap => {
                            const isValid = lap.is_pit_out_lap === false && lap.lap_duration;
                            return `
                                <div class="lap-item ${isValid ? '' : 'invalid'}" data-lap="${lap.lap_number}" onclick="loadLapTelemetry(${driverNumber}, ${lap.lap_number})">
                                    <div class="lap-header">
                                        <span class="lap-number">Giro ${lap.lap_number}</span>
                                        <span class="lap-time">${formatTime(lap.lap_duration)}</span>
                                    </div>
                                    <div class="lap-sectors">
                                        <span>S1: ${formatTime(lap.duration_sector_1)}</span>
                                        <span>S2: ${formatTime(lap.duration_sector_2)}</span>
                                        <span>S3: ${formatTime(lap.duration_sector_3)}</span>
                                    </div>
                                    ${lap.is_pit_out_lap ? '<div style="font-size: 0.75rem; color: var(--color-warning); margin-top: 0.25rem;">OUT LAP</div>' : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;

            container.innerHTML = html;

            // Load telemetry and pace data
            await loadTelemetryForDriver(driverNumber);
            await updatePaceChart();
        }

        async function loadTelemetryForDriver(driverNumber) {
            if (state.carDataCache[driverNumber]) {
                renderTelemetryCharts();
                return;
            }

            try {
                const driver = state.drivers.find(d => d.driver_number === driverNumber);
                const laps = state.lapsData[driverNumber] || [];
                
                if (laps.length === 0) return;

                const bestLap = laps.reduce((best, lap) => {
                    if (lap.is_pit_out_lap) return best;
                    if (!lap.lap_duration) return best;
                    if (!best || lap.lap_duration < best.lap_duration) return lap;
                    return best;
                }, null);

                if (!bestLap) {
                    console.log('No valid lap found for driver', driverNumber);
                    return;
                }

                console.log('Loading telemetry for driver', driverNumber, 'lap', bestLap.lap_number);

                const carData = await fetchAPI('/car_data', {
                    session_key: state.selectedSession,
                    driver_number: driverNumber
                });

                console.log('Received', carData.length, 'telemetry points');

                if (carData.length === 0) {
                    console.log('No car data available for driver', driverNumber);
                    return;
                }

                const lapStartTime = new Date(bestLap.date_start).getTime();
                const lapEndTime = lapStartTime + (bestLap.lap_duration * 1000);

                const filteredData = carData.filter(d => {
                    const pointTime = new Date(d.date).getTime();
                    return pointTime >= lapStartTime && pointTime <= lapEndTime;
                });

                console.log('Filtered to', filteredData.length, 'points for lap', bestLap.lap_number);

                state.carDataCache[driverNumber] = {
                    lapNumber: bestLap.lap_number,
                    data: filteredData.length > 0 ? filteredData : carData.slice(0, 300)
                };

                renderTelemetryCharts();
            } catch (error) {
                console.error('Error loading telemetry:', error);
                document.getElementById('tab-content-telemetry').innerHTML = `
                    <div class="error">Errore nel caricamento della telemetria: ${error.message}</div>
                `;
            }
        }

        function renderTelemetryCharts() {
            const container = document.getElementById('tab-content-telemetry');
            
            if (state.selectedDrivers.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>📊 Seleziona un pilota per visualizzare la telemetria</p></div>';
                return;
            }

            const driversWithData = state.selectedDrivers.filter(dn => {
                const hasData = state.carDataCache[dn] && state.carDataCache[dn].data && state.carDataCache[dn].data.length > 0;
                console.log('Driver', dn, 'has data:', hasData, state.carDataCache[dn]);
                return hasData;
            });
            
            if (driversWithData.length === 0) {
                const loadingStates = state.selectedDrivers.map(dn => {
                    const cached = state.carDataCache[dn];
                    return `Driver ${dn}: ${cached ? 'cached but empty' : 'not loaded'}`;
                }).join(', ');
                console.log('No drivers with data:', loadingStates);
                container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Caricamento telemetria...</p><p style="font-size: 0.75rem; margin-top: 0.5rem;">' + loadingStates + '</p></div>';
                return;
            }

            console.log('Rendering charts for drivers:', driversWithData);

            container.innerHTML = `
                <div style="padding: 1rem;">
                    <h3 style="margin-bottom: 1rem;">Telemetria - Miglior Giro</h3>
                    <div style="background: var(--color-bg-elevated); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                        <canvas id="speed-chart" style="max-height: 250px;"></canvas>
                    </div>
                    <div style="background: var(--color-bg-elevated); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                        <canvas id="throttle-chart" style="max-height: 200px;"></canvas>
                    </div>
                    <div style="background: var(--color-bg-elevated); padding: 1rem; border-radius: 8px;">
                        <canvas id="brake-chart" style="max-height: 200px;"></canvas>
                    </div>
                </div>
            `;

            createTelemetryChart('speed-chart', 'Velocità (km/h)', driversWithData, 'speed');
            createTelemetryChart('throttle-chart', 'Acceleratore (%)', driversWithData, 'throttle');
            createTelemetryChart('brake-chart', 'Freno (%)', driversWithData, 'brake');
        }

        function createTelemetryChart(canvasId, label, driverNumbers, dataKey) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;

            if (state.charts[canvasId]) {
                state.charts[canvasId].destroy();
            }

            const datasets = driverNumbers.map((driverNum, idx) => {
                const driver = state.drivers.find(d => d.driver_number === driverNum);
                const carData = state.carDataCache[driverNum]?.data || [];
                
                const color = getTeamColor(driver.team_name);
                const isDuplicate = driverNumbers.slice(0, idx).some(dn => {
                    const d = state.drivers.find(d => d.driver_number === dn);
                    return d.team_name === driver.team_name;
                });

                return {
                    label: `${driver.broadcast_name || driver.full_name} (Giro ${state.carDataCache[driverNum]?.lapNumber})`,
                    data: carData.map((d, i) => ({ x: i, y: d[dataKey] || 0 })),
                    borderColor: color,
                    backgroundColor: color + '40',
                    borderWidth: 2,
                    borderDash: isDuplicate ? [5, 5] : [],
                    pointRadius: 0,
                    tension: 0.1
                };
            });

            state.charts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            labels: { color: '#f1f5f9' }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: {
                                display: true,
                                text: 'Campioni telemetrici',
                                color: '#cbd5e1'
                            },
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        },
                        y: {
                            title: {
                                display: true,
                                text: label,
                                color: '#cbd5e1'
                            },
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        }
                    }
                }
            });
        }

        async function updatePaceChart() {
            const container = document.getElementById('tab-content-pace');
            
            if (state.selectedDrivers.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>⏱️ Seleziona piloti per confrontare il passo gara</p></div>';
                return;
            }

            const driversData = state.selectedDrivers.map(driverNum => {
                const driver = state.drivers.find(d => d.driver_number === driverNum);
                const laps = (state.lapsData[driverNum] || [])
                    .filter(lap => lap.lap_duration && !lap.is_pit_out_lap)
                    .map(lap => ({
                        lap: lap.lap_number,
                        time: lap.lap_duration
                    }));

                const last5 = laps.slice(-5);
                const avgLast5 = last5.length > 0 
                    ? last5.reduce((sum, l) => sum + l.time, 0) / last5.length 
                    : 0;
                
                const stdDev = last5.length > 1
                    ? Math.sqrt(last5.reduce((sum, l) => sum + Math.pow(l.time - avgLast5, 2), 0) / last5.length)
                    : 0;

                return {
                    driver,
                    laps,
                    avgLast5,
                    stdDev,
                    bestLap: laps.length > 0 ? Math.min(...laps.map(l => l.time)) : 0
                };
            });

            container.innerHTML = `
                <div style="padding: 1rem;">
                    <h3 style="margin-bottom: 1rem;">Passo Gara - Confronto</h3>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                        ${driversData.map(dd => `
                            <div style="background: var(--color-bg-elevated); padding: 1rem; border-radius: 8px; border-left: 3px solid ${getTeamColor(dd.driver.team_name)};">
                                <div style="font-weight: 600; margin-bottom: 0.5rem;">${dd.driver.broadcast_name || dd.driver.full_name}</div>
                                <div style="font-size: 0.875rem; color: var(--color-text-secondary);">
                                    <div>Media ultimi 5: <strong style="font-family: 'Courier New', monospace;">${formatTime(dd.avgLast5)}</strong></div>
                                    <div>Std Dev: <strong>${dd.stdDev.toFixed(3)}s</strong></div>
                                    <div>Miglior giro: <strong style="font-family: 'Courier New', monospace;">${formatTime(dd.bestLap)}</strong></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div style="background: var(--color-bg-elevated); padding: 1rem; border-radius: 8px;">
                        <canvas id="pace-chart" style="max-height: 350px;"></canvas>
                    </div>
                </div>
            `;

            createPaceChart(driversData);
        }

        function createPaceChart(driversData) {
            const ctx = document.getElementById('pace-chart');
            if (!ctx) return;

            if (state.charts['pace-chart']) {
                state.charts['pace-chart'].destroy();
            }

            const datasets = driversData.map((dd, idx) => {
                const color = getTeamColor(dd.driver.team_name);
                const isDuplicate = driversData.slice(0, idx).some(d => d.driver.team_name === dd.driver.team_name);

                return {
                    label: dd.driver.broadcast_name || dd.driver.full_name,
                    data: dd.laps.map(l => ({ x: l.lap, y: l.time })),
                    borderColor: color,
                    backgroundColor: color + '40',
                    borderWidth: 2,
                    borderDash: isDuplicate ? [5, 5] : [],
                    pointRadius: 3,
                    pointHoverRadius: 5,
                    tension: 0.2
                };
            });

            state.charts['pace-chart'] = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            labels: { color: '#f1f5f9' }
                        },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    return `${context.dataset.label}: ${formatTime(context.parsed.y)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: {
                                display: true,
                                text: 'Numero Giro',
                                color: '#cbd5e1'
                            },
                            ticks: { 
                                color: '#94a3b8',
                                stepSize: 1
                            },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Tempo Giro (s)',
                                color: '#cbd5e1'
                            },
                            ticks: { 
                                color: '#94a3b8',
                                callback: (value) => formatTime(value)
                            },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        }
                    }
                }
            });
        }

        window.loadLapTelemetry = async function(driverNumber, lapNumber) {
            document.querySelectorAll('.lap-item').forEach(item => item.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            state.currentTab = 'telemetry';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tab="telemetry"]').classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById('tab-content-telemetry').style.display = 'block';

            await loadTelemetryForDriver(driverNumber);
        };

        function updateSessionStatus() {
            const badge = document.getElementById('session-status');
            const now = new Date();
            const session = state.sessions.find(s => s.session_key === state.selectedSession);
            
            if (!session) return;

            const sessionEnd = new Date(session.date_end);
            const isLive = sessionEnd > now && new Date(session.date_start) < now;

            if (isLive) {
                badge.textContent = 'LIVE';
                badge.className = 'status-badge status-live';
            } else {
                badge.textContent = 'Storico';
                badge.className = 'status-badge status-ended';
            }
        }

        function setupEventListeners() {
            document.getElementById('year-select').addEventListener('change', loadMeetings);
            
            document.getElementById('meeting-select').addEventListener('change', async (e) => {
                const meetingKey = e.target.value;
                if (meetingKey) {
                    await loadSessions(meetingKey);
                }
            });

            document.getElementById('session-select').addEventListener('change', async (e) => {
                const sessionKey = e.target.value;
                if (sessionKey) {
                    await loadSessionData(sessionKey);
                }
            });

            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.style.display = 'none';
                    });
                    
                    const tabName = tab.dataset.tab;
                    document.getElementById(`tab-content-${tabName}`).style.display = 'block';
                    state.currentTab = tabName;
                });
            });
        }

        function showLoading(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Caricamento...</p>
                </div>
            `;
        }

        function showError(message) {
            const container = document.getElementById('standings-container');
            container.innerHTML = `<div class="error">${message}</div>`;
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
